appId: com.cloudagent.console
productName: CloudAgent
artifactName: "${productName}-${version}-${os}-${arch}.${ext}"

directories:
  app: cloudagent-desktop/release/app
  output: cloudagent-desktop/release/dist

asar: true
npmRebuild: false
nodeGypRebuild: false

files:
  - package.json
  - node_modules/**/*
  - cloudagent-desktop/apps/desktop/src/**/*
  - cloudagent-desktop/apps/api/src/**/*
  - cloudagent-desktop/apps/ui/dist/**/*
  - core/**/*
  - "!**/.cloudagent/**"
  - "!**/.cache/**"
  - "!**/.vite/**"
  - "!**/.local-data/**"
  - "!**/coverage/**"
  - "!**/docs/**"
  - "!**/test/**"
  - "!**/tests/**"
  - "!**/__tests__/**"
  - "!**/*.map"
  - "!**/*.log"
  - "!**/.DS_Store"

mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  hardenedRuntime: true
  gatekeeperAssess: false

win:
  target:
    - nsis

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
